<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdemaSense</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#EEF2F8;
  margin:0;
  font-size:14px;
}
.wrap{
  max-width:1100px;
  margin:10px auto;
  padding:10px;
}
.hero{
  background:#0C234B;
  color:white;
  padding:14px 18px;
  border-radius:14px;
}
.hero h1{
  font-size:24px;
  margin:0 0 6px;
}
.hero p{
  font-size:13px;
  margin:0;
}
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}
.panel{
  background:white;
  border:1px solid #D7DDEA;
  border-radius:14px;
  padding:12px;
}
.panel h2{
  font-size:16px;
  margin-bottom:8px;
}
.status{
  background:#FFF6D8;
  border:1px solid #E8D38E;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}
.status-title{
  font-size:18px;
  font-weight:bold;
}
.small{
  font-size:12px;
  color:#555;
}
.bar{
  height:8px;
  background:#EEE;
  border-radius:6px;
  overflow:hidden;
}
.fill-red{background:#AB0520;height:100%;}
.fill-blue{background:#0C234B;height:100%;}
.row{
  margin-bottom:8px;
}
input{
  width:100%;
  padding:6px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  margin-top:8px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#0C234B;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<h1>EdemaSense</h1>
<p>Detects early congestion using a device-derived fluid signal.</p>
</div>

<div class="main">

<!-- LEFT: RESULT -->
<div class="panel">
<h2>Status</h2>

<div class="status">
<div class="status-title" id="statusTitle">No data yet</div>
<div class="small" id="statusSub">Enter fluid signal to begin</div>
</div>

<div>
<b>Why</b>
<ul id="drivers" class="small">
<li>No drivers yet</li>
</ul>
</div>

</div>

<!-- RIGHT: INPUT -->
<div class="panel">
<h2>Quick patient check</h2>

<div class="row">
<label>Fluid signal (%)</label>
<input id="ecw" type="number">
</div>

<div class="row">
<label>Weight change (lb)</label>
<input id="weight" type="number">
</div>

<div class="row">
<label>Dyspnea</label>
<input id="dyspnea" type="checkbox">
</div>

<button onclick="run()">Generate result</button>

</div>

</div>
</div>

<script>
function run(){
 let ecw = Number(document.getElementById("ecw").value||0);
 let weight = Number(document.getElementById("weight").value||0);
 let dyspnea = document.getElementById("dyspnea").checked;

 let status = "Stable";
 let drivers = [];

 if(ecw>5){status="Early congestion"; drivers.push("Fluid signal rising");}
 if(weight>3){drivers.push("Weight increasing");}
 if(dyspnea){drivers.push("Dyspnea");}

 if(ecw>10){status="Escalation approaching";}

 document.getElementById("statusTitle").innerText=status;
 document.getElementById("statusSub").innerText="";

 let ul=document.getElementById("drivers");
 ul.innerHTML="";
 if(drivers.length===0){ul.innerHTML="<li>No drivers yet</li>";}
 else{drivers.forEach(d=>{let li=document.createElement("li");li.innerText=d;ul.appendChild(li);});}
}
</script>

</body>
</html>
